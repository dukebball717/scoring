<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DanCave Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #13171d;
    --border: #1e2530;
    --accent: #e8c84a;
    --text: #f0f2f5;
    --muted: #6b7585;
    --live: #ff4444;
    --final: #4a9eff;
    --redzone: #c0392b;
    --redzone-glow: rgba(192,57,43,0.18);
    --odds: #a8b8c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .live-dot {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--live);
  }
  .live-dot::before {
    content: '';
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--live);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.4; transform:scale(0.8); }
  }

  /* TICKER */
  .ticker-bar {
    background: var(--accent);
    color: #0a0c0f;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.82rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 5px 0; overflow: hidden; white-space: nowrap;
  }
  .ticker-inner { display: inline-block; animation: ticker 50s linear infinite; }
  @keyframes ticker {
    0%   { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  /* TABS */
  .tabs {
    display: flex; gap: 2px;
    padding: 12px 28px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 18px 12px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); cursor: pointer;
    border: none; background: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main { padding: 20px 24px; max-width: 100%; margin: 0 auto; }

  .refresh-info {
    text-align: right; font-size: 0.68rem;
    color: var(--muted); padding: 0 4px 8px;
    letter-spacing: 0.05em;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
    padding-left: 2px;
  }

  /* COMPACT GRID — fills TV screen wall-to-wall */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }

  /* GAME CARD — compact */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.25s;
    font-size: 0.82rem;
  }
  .game-card:hover { border-color: #2e3a4a; }

  .game-card.redzone {
    border-color: var(--redzone);
    box-shadow: 0 0 0 1px var(--redzone), 0 0 16px 2px var(--redzone-glow);
    animation: redzoneGlow 2s ease-in-out infinite;
  }
  @keyframes redzoneGlow {
    0%,100% { box-shadow: 0 0 0 1px var(--redzone), 0 0 16px 2px var(--redzone-glow); }
    50%      { box-shadow: 0 0 0 1px var(--redzone), 0 0 28px 5px var(--redzone-glow); }
  }
  .game-card.score-updated { animation: scoreFlash 0.9s ease-out; }
  @keyframes scoreFlash {
    0%   { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
    100% { border-color: var(--border); box-shadow: none; }
  }

  /* CARD HEADER */
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    min-height: 28px;
  }
  .game-card.redzone .card-header {
    background: rgba(192,57,43,0.1);
    border-bottom-color: rgba(192,57,43,0.3);
  }
  .game-status {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .game-status.live  { color: var(--live); }
  .game-status.final { color: var(--final); }
  .game-status.pre   { color: var(--muted); }
  .game-network { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

  /* CARD BODY */
  .card-body { padding: 8px 10px 6px; }

  .team-row {
    display: flex; align-items: center;
    gap: 8px; padding: 3px 0;
  }

  .team-logo-wrap {
    width: 28px; height: 28px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .team-logo { width: 28px; height: 28px; object-fit: contain; display: block; }
  .team-logo-placeholder {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; font-weight: 700; color: var(--muted);
  }

  .team-info { flex: 1; min-width: 0; }

  .team-name-row { display: flex; align-items: baseline; gap: 5px; }
  .team-ranking {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; font-weight: 700;
    color: var(--accent); letter-spacing: 0.04em; flex-shrink: 0;
  }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .team-sub { font-size: 0.6rem; color: var(--muted); margin-top: 0px; letter-spacing: 0.03em; }

  /* RIGHT SIDE: score + odds stacked */
  .team-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 1px; flex-shrink: 0;
  }
  .team-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem; font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--text); line-height: 1;
    min-width: 38px; text-align: right;
  }
  .team-score.leading { color: var(--accent); }

  /* ODDS pill beside/under score */
  .team-odds {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 600;
    color: var(--odds);
    letter-spacing: 0.04em;
    text-align: right;
    white-space: nowrap;
  }
  .team-odds .spread { color: #7ecfff; }
  .team-odds .ml     { color: var(--odds); }

  .divider { height: 1px; background: var(--border); margin: 3px 0; }

  /* OVER/UNDER row */
  .ou-row {
    padding: 3px 10px 5px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; color: var(--muted);
    letter-spacing: 0.06em;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .ou-row span { color: var(--odds); font-weight: 600; }

  /* SITUATION BAR */
  .situation-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px 6px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .game-card.redzone .situation-bar {
    background: rgba(192,57,43,0.07);
    border-top-color: rgba(192,57,43,0.25);
  }
  .possession-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text);
    background: rgba(255,255,255,0.07);
    border-radius: 3px; padding: 1px 6px;
  }
  .down-dist {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem; font-weight: 600;
    color: var(--text); letter-spacing: 0.02em;
  }
  .redzone-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.62rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; background: var(--redzone);
    border-radius: 3px; padding: 1px 6px;
    margin-left: auto;
    animation: badgePulse 1.2s ease-in-out infinite;
  }
  @keyframes badgePulse { 0%,100%{opacity:1} 50%{opacity:0.65} }

  .card-footer {
    padding: 3px 10px 6px;
    font-size: 0.6rem; color: var(--muted); letter-spacing: 0.04em;
    border-top: 1px solid var(--border);
  }

  /* SKELETON */
  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }
  .skeleton-card {
    border-radius: 6px; height: 120px;
    background: linear-gradient(90deg, var(--surface) 25%, #1a2030 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .empty-state { text-align:center; padding:48px 24px; color:var(--muted); }
  .empty-state .icon { font-size:2.5rem; margin-bottom:12px; }
  .empty-state p { font-size:0.9rem; line-height:1.6; }

  /* TV: on wide screens push columns tighter so more fit */
  @media (min-width: 1200px) {
    main { padding: 16px 20px; }
    .games-grid, .loading-grid {
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
  }
  @media (min-width: 1600px) {
    .games-grid, .loading-grid {
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .team-score { font-size: 2rem; }
    .team-name  { font-size: 1.1rem; }
  }
  @media (min-width: 2000px) {
    /* 4K / very wide TVs — keep cards reasonable, pack more columns */
    .games-grid, .loading-grid {
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }
    .team-score { font-size: 2.2rem; }
    .team-name  { font-size: 1.2rem; }
    .logo { font-size: 2.2rem; }
    .clock { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Dan<span>Cave</span> HQ</div>
  <div class="header-right">
    <div class="live-dot">Live</div>
    <div class="clock" id="clock">--:--</div>
  </div>
</header>

<div class="ticker-bar">
  <span class="ticker-inner" id="ticker">Loading scores...</span>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-sport="nfl">NFL</button>
  <button class="tab" data-sport="nba">NBA</button>
  <button class="tab" data-sport="mlb">MLB</button>
  <button class="tab" data-sport="nhl">NHL</button>
  <button class="tab" data-sport="ncaaf">NCAAF</button>
  <button class="tab" data-sport="ncaab">NCAAB</button>
  <button class="tab" data-sport="soccer">Soccer</button>
</div>

<main>
  <div class="refresh-info" id="refreshInfo">Auto-updates every 10s</div>
  <div id="content">
    <div class="loading-grid">
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
      <div class="skeleton-card"></div><div class="skeleton-card"></div>
    </div>
  </div>
</main>

<script>
const SPORTS = {
  nfl:    { path: 'football/nfl',                       league: 'football/leagues/nfl',                 label: 'NFL',   football: true,  college: false },
  nba:    { path: 'basketball/nba',                     league: 'basketball/leagues/nba',               label: 'NBA',   football: false, college: false },
  mlb:    { path: 'baseball/mlb',                       league: 'baseball/leagues/mlb',                 label: 'MLB',   football: false, college: false },
  nhl:    { path: 'hockey/nhl',                         league: 'hockey/leagues/nhl',                   label: 'NHL',   football: false, college: false },
  ncaaf:  { path: 'football/college-football',          league: 'football/leagues/college-football',    label: 'NCAAF', football: true,  college: true  },
  ncaab:  { path: 'basketball/mens-college-basketball', league: null,                                   label: 'NCAAB', football: false, college: false },
  soccer: { path: 'soccer/usa.1',                       league: null,                                   label: 'MLS',   football: false, college: false },
};

let currentSport = 'nfl';
let prevScores   = {};
let oddsCache    = {};   // eventId -> odds object
let refreshTimer = null;

// ── Clock ──────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ── Tabs ───────────────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentSport = btn.dataset.sport;
  prevScores = {};
  oddsCache  = {};
  fetchScores();
});

// ── Odds fetch ─────────────────────────────────────────────────────────────
// Fetches odds for a single event and caches. Returns {awaySpread, homeSpread, awayML, homeML, overUnder}
async function fetchOdds(eventId) {
  if (oddsCache[eventId]) return oddsCache[eventId];
  const sport = SPORTS[currentSport];
  if (!sport.league) return null;
  try {
    const url = `https://sports.core.api.espn.com/v2/sports/${sport.league}/events/${eventId}/competitions/${eventId}/odds?limit=5`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const items = data.items || [];
    // Prefer consensus or first available provider
    const line = items.find(i => i.provider?.name?.toLowerCase().includes('consensus'))
              || items.find(i => i.spread !== undefined)
              || items[0];
    if (!line) return null;

    const awayOdds = line.awayTeamOdds;
    const homeOdds = line.homeTeamOdds;

    const result = {
      overUnder:   line.overUnder ?? null,
      details:     line.details   || '',       // e.g. "KC -3.5"
      awaySpread:  awayOdds?.current?.pointSpread?.alternateDisplayValue ?? awayOdds?.spreadOdds ?? null,
      homeSpread:  homeOdds?.current?.pointSpread?.alternateDisplayValue ?? homeOdds?.spreadOdds ?? null,
      awayML:      awayOdds?.moneyLine ?? awayOdds?.current?.moneyLine?.american ?? null,
      homeML:      homeOdds?.moneyLine ?? homeOdds?.current?.moneyLine?.american ?? null,
    };
    oddsCache[eventId] = result;
    return result;
  } catch { return null; }
}

// ── Main fetch ─────────────────────────────────────────────────────────────
async function fetchScores() {
  const sport = SPORTS[currentSport];
  const url   = `https://site.api.espn.com/apis/site/v2/sports/${sport.path}/scoreboard`;
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error('Network error');
    const data = await res.json();
    const events = data.events || [];

    // Fetch odds for all events in parallel (non-blocking)
    if (sport.league) {
      await Promise.allSettled(events.map(ev => fetchOdds(ev.id)));
    }

    render(events);
    updateTicker(events);
    document.getElementById('refreshInfo').textContent =
      `Last updated: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'})} · Auto-refreshes every 10s`;
  } catch(err) {
    document.getElementById('content').innerHTML = `
      <div class="empty-state">
        <div class="icon">📡</div>
        <p>Couldn't load scores.<br>Check connection — retrying in 10s.</p>
      </div>`;
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(events) {
  const live  = events.filter(e => isLive(e));
  const pre   = events.filter(e => isPre(e));
  const final = events.filter(e => isFinal(e));

  let html = '';
  if (!events.length) {
    html = `<div class="empty-state"><div class="icon">🏟️</div>
      <p>No games today for ${SPORTS[currentSport].label}.<br>Check back soon!</p></div>`;
  } else {
    if (live.length)  html += section('🔴 In Progress', live);
    if (pre.length)   html += section('📅 Upcoming', pre);
    if (final.length) html += section('✅ Final', final);
  }

  document.getElementById('content').innerHTML = html;

  events.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    const id = ev.id;
    const scores = getScores(comp);
    const prev   = prevScores[id];
    if (prev && (prev.home !== scores.home || prev.away !== scores.away)) {
      const card = document.querySelector(`[data-game="${id}"]`);
      if (card && !card.classList.contains('redzone')) {
        card.classList.remove('score-updated');
        void card.offsetWidth;
        card.classList.add('score-updated');
      }
    }
    prevScores[id] = scores;
  });
}

function section(title, events) {
  return `<div class="section-label">${title}</div>
    <div class="games-grid">${events.map(gameCard).join('')}</div>`;
}

// ── Game Card ──────────────────────────────────────────────────────────────
function gameCard(ev) {
  const comp  = ev.competitions?.[0];
  if (!comp) return '';

  const teams = comp.competitors || [];
  const home  = teams.find(t => t.homeAway === 'home') || teams[0] || {};
  const away  = teams.find(t => t.homeAway === 'away') || teams[1] || {};
  const status = ev.status?.type;
  const state  = status?.state || 'pre';
  const detail = status?.shortDetail || status?.detail || '';
  const broadcast = comp.broadcasts?.[0]?.names?.[0] || '';

  const homeScore = parseInt(home.score ?? 0);
  const awayScore = parseInt(away.score ?? 0);
  const homeLeads = homeScore > awayScore;
  const awayLeads = awayScore > homeScore;

  const statusClass = state === 'in' ? 'live' : state === 'post' ? 'final' : 'pre';
  const statusText  = state === 'in' ? `● ${detail}` : state === 'post' ? 'Final' : detail;

  const sport      = SPORTS[currentSport];
  const isFootball = sport.football;
  const isCollege  = sport.college;
  const sit        = comp.situation;
  const inRedZone  = !!(isFootball && state === 'in' && sit?.isRedZone);

  // Odds
  const odds = oddsCache[ev.id] || null;

  // Situation bar
  let situationHtml = '';
  if (isFootball && state === 'in' && sit) {
    const downDist = sit.downDistanceText || sit.shortDownDistanceText || '';
    const possId   = sit.possession;
    const possTeam = teams.find(t => t.team?.id === possId);
    const possAbbr = possTeam?.team?.abbreviation || '';
    const ballTag  = possAbbr ? `<span class="possession-tag">🏈 ${possAbbr}</span>` : '';
    const rzBadge  = inRedZone ? `<span class="redzone-badge">🔴 Red Zone</span>` : '';
    if (ballTag || downDist) {
      situationHtml = `<div class="situation-bar">${ballTag}${downDist ? `<span class="down-dist">${downDist}</span>` : ''}${rzBadge}</div>`;
    }
  }

  // Over/under row
  let ouHtml = '';
  if (odds?.overUnder != null) {
    ouHtml = `<div class="ou-row">O/U <span>${odds.overUnder}</span></div>`;
  }

  const cardClass = `game-card${inRedZone ? ' redzone' : ''}`;

  return `
  <div class="${cardClass}" data-game="${ev.id}">
    <div class="card-header">
      <span class="game-status ${statusClass}">${statusText}</span>
      ${broadcast ? `<span class="game-network">${broadcast}</span>` : ''}
    </div>
    <div class="card-body">
      ${teamRow(away, awayScore, awayLeads, state, isCollege, odds, 'away')}
      <div class="divider"></div>
      ${teamRow(home, homeScore, homeLeads, state, isCollege, odds, 'home')}
    </div>
    ${ouHtml}
    ${situationHtml}
    ${ev.venue?.fullName ? `<div class="card-footer">${ev.venue.fullName}</div>` : ''}
  </div>`;
}

// ── Team Row ───────────────────────────────────────────────────────────────
function getBestLogo(team) {
  const fix = url => (url||'').replace(/^http:\/\//i,'https://');
  if (team.logos?.length) {
    const light = team.logos.find(l => !l.rel?.includes('dark')) || team.logos[0];
    return fix(light.href || light.url || '');
  }
  return fix(team.logo || '');
}

function fmtML(ml) {
  if (ml == null || ml === 0) return '';
  const n = parseInt(ml);
  if (isNaN(n)) return String(ml);
  return n > 0 ? `+${n}` : String(n);
}

function teamRow(team, score, leading, state, isCollege, odds, side) {
  const name     = team.team?.abbreviation || team.team?.shortDisplayName || '—';
  const fullName = team.team?.displayName || name;
  const logo     = getBestLogo(team.team || {});
  const showScore = state !== 'pre';

  const rank   = team.curatedRank?.current || team.team?.rank || null;
  const record = team.records?.[0]?.summary || '';

  let rankHtml = '';
  let subHtml  = '';
  if (isCollege && rank && rank <= 25) {
    rankHtml = `<span class="team-ranking">#${rank}</span>`;
    if (record) subHtml = `<div class="team-sub">${record}</div>`;
  } else if (record) {
    subHtml = `<div class="team-sub">${record}</div>`;
  }

  const logoHtml = logo
    ? `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';

  // Odds display
  let oddsHtml = '';
  if (odds) {
    const spread = side === 'away' ? odds.awaySpread : odds.homeSpread;
    const ml     = side === 'away' ? odds.awayML     : odds.homeML;
    const spreadStr = spread != null ? String(spread) : '';
    const mlStr     = ml != null ? fmtML(ml) : '';
    if (spreadStr || mlStr) {
      oddsHtml = `<div class="team-odds">
        ${spreadStr ? `<span class="spread">${spreadStr}</span>` : ''}
        ${mlStr ? `<span class="ml"> ${mlStr}</span>` : ''}
      </div>`;
    }
  }

  return `
  <div class="team-row">
    <div class="team-logo-wrap">
      ${logoHtml}
      <div class="team-logo-placeholder" ${logo ? 'style="display:none"' : ''}>${name.slice(0,3)}</div>
    </div>
    <div class="team-info">
      <div class="team-name-row">
        ${rankHtml}
        <span class="team-name" title="${fullName}">${name}</span>
      </div>
      ${subHtml}
    </div>
    <div class="team-right">
      ${showScore ? `<div class="team-score ${leading?'leading':''}">${score}</div>` : ''}
      ${oddsHtml}
    </div>
  </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function getScores(comp) {
  const teams = comp.competitors || [];
  const home  = teams.find(t => t.homeAway==='home') || {};
  const away  = teams.find(t => t.homeAway==='away') || {};
  return { home: home.score, away: away.score };
}
function isLive(e)  { return e.status?.type?.state === 'in'; }
function isPre(e)   { return e.status?.type?.state === 'pre'; }
function isFinal(e) { return e.status?.type?.state === 'post'; }

// ── Ticker ─────────────────────────────────────────────────────────────────
function updateTicker(events) {
  const live = events.filter(isLive);
  if (!live.length) {
    document.getElementById('ticker').textContent =
      `${SPORTS[currentSport].label} Scoreboard — No games currently live`;
    return;
  }
  const parts = live.map(ev => {
    const comp  = ev.competitions?.[0];
    const teams = comp?.competitors || [];
    const home  = teams.find(t => t.homeAway==='home') || {};
    const away  = teams.find(t => t.homeAway==='away') || {};
    const det   = ev.status?.type?.shortDetail || '';
    const rz    = comp?.situation?.isRedZone ? ' 🔴' : '';
    return `${away.team?.abbreviation} ${away.score??0}  –  ${home.score??0} ${home.team?.abbreviation}  (${det})${rz}`;
  });
  document.getElementById('ticker').textContent = '  ◆  ' + parts.join('     ◆     ');
}

// ── Auto-refresh ───────────────────────────────────────────────────────────
function startRefresh() {
  clearInterval(refreshTimer);
  fetchScores();
  refreshTimer = setInterval(fetchScores, 10000);
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) clearInterval(refreshTimer);
  else startRefresh();
});
startRefresh();
</script>
